# Must match VITE_SUPABASE_PROJECT_ID / your .env - frontend calls this project
project_id = "unyiuyzhteeuoyujqpbf"

[auth]
enable_anonymous_sign_ins = true

# Public auditor - no JWT required (function uses service role for all ops)
[functions.auditor-public]
verify_jwt = false

# audit-vault - called by fraud backend with service role; skip gateway JWT check
[functions.audit-vault]
verify_jwt = false

# admin-set-client-password - admin only, sets client temp password
[functions.admin-set-client-password]
verify_jwt = true

# admin-create-user - admin only, creates users without sending email (bypasses rate limit)
[functions.admin-create-user]
verify_jwt = true